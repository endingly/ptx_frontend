    name: "optional predicate register"
    description: "predicate register, may be omitted"
  optional_imm:
    name: "optional immediate"
    description: "immediate, may be omitted"
  optional_reg_or_imm:
    name: "optional register or immediate"
    description: "register or immediate, may be omitted"
