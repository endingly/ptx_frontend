arg_kinds:
  reg:
    name: "register"
    description: "single register"
    cpp: "StateSpace::Reg"
  pred:
    name: "predicate register"
    description: "predicate register"
    cpp: "StateSpace::Pred"
  addr:
    name: "address"
    description: "[reg+imm] or [reg] or [symbol]"
    cpp: "StateSpace::Generic"
  imm:
    name: "immediate"
    description: "immediate constant"
    cpp: "StateSpace::Reg"
  label:
    name: "label"
    description: "branch target label (identifier)"
