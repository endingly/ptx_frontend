      args:
        - { name: "dst", kind: reg }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: reg_or_imm }
        - { name: "src3", kind: optional_pred, note: "bool-op source" }
      cpp_struct: "InstrSet"

