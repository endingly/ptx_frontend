###############################################################################
# prefetch / prefetchu
# https://docs.nvidia.com/cuda/parallel-thread-execution/index.html#data-movement-and-conversion-instructions-prefetch-prefetchu
###############################################################################
- opcode: "prefetch"
  doc: "PTX ISA §9.7.9.15"
  variants:
    - modifiers:
        space:
          kind: optional
          type: StateSpace
          values:
            - { token: ".global", cpp: "StateSpace::Global" }
            - { token: ".local", cpp: "StateSpace::Local" }
        level:
          kind: required
          type: CacheLevel
          values:
            - { token: ".L1", cpp: "CacheLevel::L1" }
            - { token: ".L2", cpp: "CacheLevel::L2" }
      args:
        - { name: "src", kind: addr }
      cpp_struct: "InstrPrefetch"

- opcode: "prefetchu"
  doc: "PTX ISA §9.7.9.15"
  variants:
    - modifiers:
        level:
          kind: required
          type: CacheLevel
          values:
            - { token: ".L1", cpp: "CacheLevel::L1" }
      args:
        - { name: "src", kind: reg }
      cpp_struct: "InstrPrefetch"
      emit_note: "space = StateSpace::Generic (uniform)"

