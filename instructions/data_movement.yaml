# PTX ISA 9.2 — Data Movement and Conversion Instructions
# Ref: https://docs.nvidia.com/cuda/parallel-thread-execution/index.html#data-movement-and-conversion-instructions

###############################################################################
# mov
# https://docs.nvidia.com/cuda/parallel-thread-execution/index.html#data-movement-and-conversion-instructions-mov
###############################################################################
- opcode: "mov"
  doc: "PTX ISA §9.7.9.3"
  variants:
    - description: "mov scalar/pred — dst and src are both scalar"
      modifiers:
        type:
          kind: required
          type: ScalarType
          values:
            - { token: ".pred", cpp: "ScalarType::Pred" }
            - { token: ".b16", cpp: "ScalarType::B16" }
            - { token: ".b32", cpp: "ScalarType::B32" }
            - { token: ".b64", cpp: "ScalarType::B64" }
            - { token: ".b128", cpp: "ScalarType::B128" }
            - { token: ".u16", cpp: "ScalarType::U16" }
            - { token: ".u32", cpp: "ScalarType::U32" }
            - { token: ".u64", cpp: "ScalarType::U64" }
            - { token: ".s16", cpp: "ScalarType::S16" }
            - { token: ".s32", cpp: "ScalarType::S32" }
            - { token: ".s64", cpp: "ScalarType::S64" }
            - { token: ".f32", cpp: "ScalarType::F32" }
            - { token: ".f64", cpp: "ScalarType::F64" }
      args:
        - { name: "dst", kind: reg }
        - { name: "src", kind: reg_or_imm }
      cpp_struct: "InstrMov"

    - description: >
        mov vector pack — dst is scalar reg, src is { a, b [, c, d] }
        The number of elements is inferred from sizeof(type) / sizeof(element).
        e.g. mov.b32 r, {a,b}  means 2×u16→b32
      modifiers:
        type:
          kind: required
          type: ScalarType
          values:
            - { token: ".b32", cpp: "ScalarType::B32" }
            - { token: ".b64", cpp: "ScalarType::B64" }
            - { token: ".b128", cpp: "ScalarType::B128" }
      args:
        - { name: "dst", kind: reg }
        - {
            name: "src",
            kind: reg_list,
            note: "{ a, b } or { a, b, c, d } — no .vN modifier!",
          }
      cpp_struct: "InstrMov"

    - description: >
        mov vector unpack — dst is { d, e [, f, g] }, src is scalar reg
        e.g. mov.b64 {lo, hi}, %x
      modifiers:
        type:
          kind: required
          type: ScalarType
          values:
            - { token: ".b32", cpp: "ScalarType::B32" }
            - { token: ".b64", cpp: "ScalarType::B64" }
            - { token: ".b128", cpp: "ScalarType::B128" }
      args:
        - {
            name: "dst",
            kind: reg_list,
            note: "{ d, e } or { d, e, f, g } — no .vN modifier!",
          }
        - { name: "src", kind: reg }
      cpp_struct: "InstrMov"

