# PTX ISA 9.2 — Floating-Point Arithmetic Instructions

###############################################################################
# fma
###############################################################################
- opcode: "fma"
  doc: "PTX ISA §9.7.2.1"
  variants:
    - description: "fma.f32"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        rounding:
          kind: required
          type: RoundingMode
          values:
            - { token: ".rn", cpp: "RoundingMode::NearestEven" }
            - { token: ".rz", cpp: "RoundingMode::Zero" }
            - { token: ".rm", cpp: "RoundingMode::NegativeInf" }
            - { token: ".rp", cpp: "RoundingMode::PositiveInf" }
        flush_to_zero:
          kind: optional
          type: bool
          values:
            - { token: ".ftz", cpp: "true" }
        saturate:
          kind: optional
          type: bool
          values:
            - { token: ".sat", cpp: "true" }
        type_:
          kind: fixed
          type: ScalarType
          fixed_value: { token: ".f32", cpp: "ScalarType::F32" }
      args:
        - { name: "dst", kind: reg }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: reg_or_imm }
        - { name: "src3", kind: reg_or_imm }
      cpp_struct: "InstrFma"
      emit_note: "ArithFloat"

    - description: "fma.f64"
      constraints:
        min_ptx_version: 1.0
        min_sm: 13
      modifiers:
        rounding:
          kind: required
          type: RoundingMode
          values:
            - { token: ".rn", cpp: "RoundingMode::NearestEven" }
            - { token: ".rz", cpp: "RoundingMode::Zero" }
            - { token: ".rm", cpp: "RoundingMode::NegativeInf" }
            - { token: ".rp", cpp: "RoundingMode::PositiveInf" }
        type_:
          kind: fixed
          type: ScalarType
          fixed_value: { token: ".f64", cpp: "ScalarType::F64" }
      args:
        - { name: "dst", kind: reg }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: reg_or_imm }
        - { name: "src3", kind: reg_or_imm }
      cpp_struct: "InstrFma"
      emit_note: "ArithFloat"

    - description: "fma half-precision (f16/f16x2)"
      constraints:
        min_ptx_version: 6.0
        min_sm: 53
      modifiers:
        rounding:
          kind: optional
          type: RoundingMode
          values:
            - { token: ".rn", cpp: "RoundingMode::NearestEven" }
        flush_to_zero:
          kind: optional
          type: bool
          values:
            - { token: ".ftz", cpp: "true" }
        saturate:
          kind: optional
          type: bool
          values:
            - { token: ".sat", cpp: "true" }
        relu:
          kind: optional
          type: bool
          values:
            - { token: ".relu", cpp: "true" }
        type_:
          kind: required
          type: ScalarType
          values:
            - { token: ".f16", cpp: "ScalarType::F16" }
            - { token: ".f16x2", cpp: "ScalarType::F16x2" }
      args:
        - { name: "dst", kind: reg }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: reg_or_imm }
        - { name: "src3", kind: reg_or_imm }
      cpp_struct: "InstrFma"
      emit_note: "ArithFloat"

    - description: "fma bf16/bf16x2"
      constraints:
        min_ptx_version: 7.0
        min_sm: 80
      modifiers:
        rounding:
          kind: optional
          type: RoundingMode
          values:
            - { token: ".rn", cpp: "RoundingMode::NearestEven" }
        saturate:
          kind: optional
          type: bool
          values:
            - { token: ".sat", cpp: "true" }
        relu:
          kind: optional
          type: bool
          values:
            - { token: ".relu", cpp: "true" }
        type_:
          kind: required
          type: ScalarType
          values:
            - { token: ".bf16", cpp: "ScalarType::BF16" }
            - { token: ".bf16x2", cpp: "ScalarType::BF16x2" }
      args:
        - { name: "dst", kind: reg }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: reg_or_imm }
        - { name: "src3", kind: reg_or_imm }
      cpp_struct: "InstrFma"
      emit_note: "ArithFloat"

