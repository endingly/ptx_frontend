        - { name: "src2", kind: reg_or_imm }
      emit_note:
        kind: sub_variant
        instance: "data"
        emit_type: "ArithInteger"

    - description: "sub integer with optional sat for packed types"
      constraints:
        min_ptx_version: 9.2
        min_sm: 120
      modifiers:
        sat:
          kind: optional
          type: bool
          values:
            - { token: ".sat", cpp: "true" }
        type_:
          kind: required
          type: ScalarType
          values:
            - { token: ".u8x4", cpp: "ScalarType::U8x4" }
            - { token: ".s8x4", cpp: "ScalarType::S8x4" }
      args:
        - { name: "dst", kind: reg }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: reg_or_imm }
      emit_note:
        kind: sub_variant
        instance: "data"
        emit_type: "ArithInteger"

###############################################################################
# mul
###############################################################################
- opcode: "mul"
  doc: "PTX ISA §9.7.1.3"
  cpp: "InstrMul"
  variants:
    - description: "mul integer"
      constraints:
        min_ptx_version: 1
        min_sm: 0
      modifiers:
        mode:
          kind: required
          type: MulIntControl
          values:
            - { token: ".wide", cpp: "MulIntControl::Wide" }
            - { token: ".low", cpp: "MulIntControl::Low" }
            - { token: ".hi", cpp: "MulIntControl::High" }
        type_:
          kind: required
          type: ScalarType
          values:
            - { token: ".u16", cpp: "ScalarType::U16" }
            - { token: ".u32", cpp: "ScalarType::U32" }
            - { token: ".s32", cpp: "ScalarType::S32" }
            - { token: ".u64", cpp: "ScalarType::U64" }
            - { token: ".s16", cpp: "ScalarType::S16" }
            - { token: ".s64", cpp: "ScalarType::S64" }
      args:
        - { name: "dst", kind: reg }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: reg_or_imm }
      emit_note:
        kind: sub_variant
        instance: "data"
        emit_type: "MulInt"

