# PTX ISA 9.2 — Integer Arithmetic Instructions
# Ref: https://docs.nvidia.com/cuda/parallel-thread-execution/index.html#integer-arithmetic-instructions

###############################################################################
# add
###############################################################################
# constraints schema:
#   min_ptx_version: X.Y           # min PTX ISA version
#   min_sm: NN                     # min SM architecture (universal sm_NN+)
###############################################################################
- opcode: "add"
  doc: "PTX ISA §9.7.1.1"
  variants:
    # ── Integer: universal non sat ──────────────────────────────────────────────────
    # add.sat.s32 from PTX 1.0, so S32 is also in this group
    - description: "add integer no-sat (universal)"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        type_:
          kind: required
          type: ScalarType
          values:
            - { token: ".u16", cpp: "ScalarType::U16" }
            - { token: ".u64", cpp: "ScalarType::U64" }
            - { token: ".s16", cpp: "ScalarType::S16" }
            - { token: ".s64", cpp: "ScalarType::S64" }
            - { token: ".u32", cpp: "ScalarType::U32" }
            - { token: ".s32", cpp: "ScalarType::S32" }
      args:
        - { name: "dst",  kind: reg }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: reg_or_imm }
      cpp_struct: "InstrAdd"
      emit_note: "ArithInteger"

    # ── Integer: add.sat.s32 (universal) ─────────────────────────────────────
    # signed 32-bit saturating add supported from PTX 1.0, all SM
    - description: "add.sat.s32 (universal)"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        saturate:
          kind: fixed
          type: bool
          fixed_value: { token: ".sat", cpp: "true" }
        type_:
          kind: fixed
          type: ScalarType
          fixed_value: { token: ".s32", cpp: "ScalarType::S32" }
      args:
        - { name: "dst", kind: reg }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: reg_or_imm }
      cpp_struct: "InstrAdd"
      emit_note: "ArithInteger"

    # ── Integer: SIMD no-sat (sm_90+) ─────────────────────────────────────────
    # add.u16x2 / add.s16x2 (no sat) introduced in PTX 8.0, requires sm_90+
    - description: "add SIMD no-sat (sm_90+)"
      constraints:
        min_ptx_version: 8.0
        min_sm: 90
      modifiers:
        type_:
          kind: required
          type: ScalarType
          values:
            - { token: ".u16x2", cpp: "ScalarType::U16x2" }
            - { token: ".s16x2", cpp: "ScalarType::S16x2" }
      args:
        - { name: "dst", kind: reg }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: reg_or_imm }
      cpp_struct: "InstrAdd"
      emit_note: "ArithInteger"

    # ── Integer: packed optional sat (sm_120f family) ──────────────────────────
    # add{.sat}.u8x4 / add{.sat}.s8x4 introduced in PTX 9.2, requires sm_120f family
    - description: "add packed optional-sat (sm_120f family)"
      constraints:
        min_ptx_version: 9.2
        min_sm: 120
      modifiers:
        saturate:
          kind: optional
          type: bool
          values:
            - { token: ".sat", cpp: "true" }
        type_:
          kind: required
          type: ScalarType
          values:
            - { token: ".u8x4", cpp: "ScalarType::U8x4" }
            - { token: ".s8x4", cpp: "ScalarType::S8x4" }
      args:
        - { name: "dst", kind: reg }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: reg_or_imm }
      cpp_struct: "InstrAdd"
      emit_note: "ArithInteger"

    # ── Integer: SIMD sat + u32 sat (sm_120f family) ────────────────────────────
    # add.sat.u16x2 / add.sat.s16x2 / add.sat.u32 introduced in PTX 9.2, requires sm_120f family
    # Note: u16x2/s16x2 no-sat versions are in sm_90+ variants; here sat is mandatory
    - description: "add SIMD sat / add.sat.u32 (sm_120f family)"
      constraints:
        min_ptx_version: 9.2
        min_sm: 120
      modifiers:
        saturate:
          kind: fixed
          type: bool
          fixed_value: { token: ".sat", cpp: "true" }
        type_:
          kind: required
          type: ScalarType
          values:
            - { token: ".u16x2", cpp: "ScalarType::U16x2" }
            - { token: ".s16x2", cpp: "ScalarType::S16x2" }
            - { token: ".u32", cpp: "ScalarType::U32" }
      args:
        - { name: "dst", kind: reg }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: reg_or_imm }
      cpp_struct: "InstrAdd"
      emit_note:
        "ArithInteger"

        # ── add.f32 ──────────────────────────────────────────────────────────────
    - description: "add.f32"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        rounding:
          kind: optional
          type: RoundingMode
          values:
            - { token: ".rn", cpp: "RoundingMode::NearestEven" }
            - { token: ".rz", cpp: "RoundingMode::Zero" }
            - { token: ".rm", cpp: "RoundingMode::NegativeInf", min_sm: 20 }
            - { token: ".rp", cpp: "RoundingMode::PositiveInf", min_sm: 20 }
        flush_to_zero:
          kind: optional
          type: bool
          values:
            - { token: ".ftz", cpp: "true" }
        saturate:
          kind: optional
          type: bool
          values:
            - { token: ".sat", cpp: "true" }
        type_:
          kind: fixed
          type: ScalarType
          fixed_value: { token: ".f32", cpp: "ScalarType::F32" }
      args:
        - { name: "dst", kind: reg }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: reg_or_imm }
      cpp_struct: "InstrAdd"
      emit_note: "ArithFloat"

    # ── add.f64 ──────────────────────────────────────────────────────────────
    # ftz / sat not supported; sm_13+ required; .rm/.rp inherit variant min_sm
    - description: "add.f64"
      constraints:
        min_ptx_version: 1.0
        min_sm: 13
      modifiers:
        rounding:
          kind: optional
          type: RoundingMode
          values:
            - { token: ".rn", cpp: "RoundingMode::NearestEven" }
            - { token: ".rz", cpp: "RoundingMode::Zero" }
            - { token: ".rm", cpp: "RoundingMode::NegativeInf" }
            - { token: ".rp", cpp: "RoundingMode::PositiveInf" }
        type_:
          kind: fixed
          type: ScalarType
          fixed_value: { token: ".f64", cpp: "ScalarType::F64" }
      args:
        - { name: "dst", kind: reg }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: reg_or_imm }
      cpp_struct: "InstrAdd"
      emit_note: "ArithFloat"

    # ── add.f32x2 ────────────────────────────────────────────────────────────
    # sat not supported (absent = disallowed); sm_100+, PTX 8.6
    - description: "add.f32x2"
      constraints:
        min_ptx_version: 8.6
        min_sm: 100
      modifiers:
        rounding:
          kind: optional
          type: RoundingMode
          values:
            - { token: ".rn", cpp: "RoundingMode::NearestEven" }
            - { token: ".rz", cpp: "RoundingMode::Zero" }
            - { token: ".rm", cpp: "RoundingMode::NegativeInf" }
            - { token: ".rp", cpp: "RoundingMode::PositiveInf" }
        flush_to_zero:
          kind: optional
          type: bool
          values:
            - { token: ".ftz", cpp: "true" }
        type_:
          kind: fixed
          type: ScalarType
          fixed_value: { token: ".f32x2", cpp: "ScalarType::F32x2" }
      args:
        - { name: "dst", kind: reg }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: reg_or_imm }
      cpp_struct: "InstrAdd"
      emit_note: "ArithFloat"

    # ── add half-precision (f16 / f16x2) ─────────────────────────────────────
    # rnd: .rn only; ftz / sat legal
    - description: "add half-precision (f16, f16x2)"
      constraints:
        min_ptx_version: 6.0
        min_sm: 53
      modifiers:
        rounding:
          kind: optional
          type: RoundingMode
          values:
            - { token: ".rn", cpp: "RoundingMode::NearestEven" }
        flush_to_zero:
          kind: optional
          type: bool
          values:
            - { token: ".ftz", cpp: "true" }
        saturate:
          kind: optional
          type: bool
          values:
            - { token: ".sat", cpp: "true" }
        type_:
          kind: required
          type: ScalarType
          values:
            - { token: ".f16", cpp: "ScalarType::F16" }
            - { token: ".f16x2", cpp: "ScalarType::F16x2" }
      args:
        - { name: "dst", kind: reg }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: reg_or_imm }
      cpp_struct: "InstrAdd"
      emit_note: "ArithFloat"

    # ── add bf16 / bf16x2 ────────────────────────────────────────────────────
    # ftz / sat not supported; rnd: .rn only
    - description: "add bf16/bf16x2"
      constraints:
        min_ptx_version: 7.0
        min_sm: 80
      modifiers:
        rounding:
          kind: optional
          type: RoundingMode
          values:
            - { token: ".rn", cpp: "RoundingMode::NearestEven" }
        type_:
          kind: required
          type: ScalarType
          values:
            - { token: ".bf16", cpp: "ScalarType::BF16" }
            - { token: ".bf16x2", cpp: "ScalarType::BF16x2" }
      args:
        - { name: "dst", kind: reg }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: reg_or_imm }
      cpp_struct: "InstrAdd"
      emit_note: "ArithFloat"

