# PTX ISA 9.2 — Logic and Shift Instructions

- opcode: "and"
  doc: "PTX ISA §9.7.5.1"
  variants:
    - description: "and pred/b16/b32/b64"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        type_:
          kind: required
          type: ScalarType
          values:
            - { token: ".pred", cpp: "ScalarType::Pred" }
            - { token: ".b16", cpp: "ScalarType::B16" }
            - { token: ".b32", cpp: "ScalarType::B32" }
            - { token: ".b64", cpp: "ScalarType::B64" }
      args:
        - { name: "dst", kind: reg }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: reg_or_imm }
      cpp_struct: "InstrAnd"

