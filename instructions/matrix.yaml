          values:
            - { token: ".trans", cpp: "true" }
        number:
          kind: required
          type: MatrixNumber
          values:
            - { token: ".x1", cpp: "MatrixNumber::X1" }
            - { token: ".x2", cpp: "MatrixNumber::X2" }
