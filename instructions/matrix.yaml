###############################################################################
# cp.async.bulk.tensor  (TMA — 1D/2D/3D/4D/5D)
###############################################################################
- opcode: "cp.async.bulk.tensor"
  doc: "PTX ISA §9.7.11.16"
  variants:
    - description: "cp.async.bulk.tensor shared←global (load)"
      modifiers:
        dst_space:
          kind: fixed
          fixed_value: ".shared::cluster"
        src_space:
          kind: fixed
          fixed_value: ".global"
        dim:
          kind: required
          type: TmaDim
          values:
            - { token: ".1d", cpp: "TmaDim::D1" }
            - { token: ".2d", cpp: "TmaDim::D2" }
            - { token: ".3d", cpp: "TmaDim::D3" }
            - { token: ".4d", cpp: "TmaDim::D4" }
            - { token: ".5d", cpp: "TmaDim::D5" }
        im2col:
          kind: optional
          type: TmaLoadMode
          values:
            - { token: ".im2col",       cpp: "TmaLoadMode::Im2col"      }
            - { token: ".im2col_no_offs",cpp: "TmaLoadMode::Im2colNoOff" }
        completion_mechanism:
          kind: required
          type: CpAsyncBulkCompletionMechanism
          values:
            - { token: ".mbarrier::complete_tx::bytes",
                cpp: "CpBulkCM::MbarComplTx" }
            - { token: ".multicast::cluster::mbarrier::complete_tx::bytes",
                cpp: "CpBulkCM::MulticastMbarComplTx" }
        level_cache_hint:
          kind: optional
          type: bool
          values:
            - { token: ".L2::cache_hint", cpp: "true" }
      args:
        - { name: "dst_smem",       kind: addr }
        - { name: "tensor_map",     kind: reg }
        - { name: "coords",         kind: reg_list, note: "1..5 coordinate regs" }
        - { name: "mbar_ptr",       kind: addr }
        - { name: "im2col_offsets", kind: optional_reg_list }
        - { name: "multicast_mask", kind: optional_reg }
        - { name: "cache_policy",   kind: optional_reg }
      cpp_struct: "InstrCpAsyncBulkTensor"
      emit_note: "direction = Load"

    - description: "cp.async.bulk.tensor global←shared (store)"
      modifiers:
        dst_space:
          kind: fixed
          fixed_value: ".global"
        src_space:
          kind: required
          type: StateSpace
          values:
            - { token: ".shared::cta",     cpp: "StateSpace::Shared"        }
            - { token: ".shared::cluster", cpp: "StateSpace::SharedCluster" }
        dim:
          kind: required
          type: TmaDim
          values:
            - { token: ".1d", cpp: "TmaDim::D1" }
            - { token: ".2d", cpp: "TmaDim::D2" }
            - { token: ".3d", cpp: "TmaDim::D3" }
            - { token: ".4d", cpp: "TmaDim::D4" }
            - { token: ".5d", cpp: "TmaDim::D5" }
        completion_mechanism:
          kind: required
          type: CpAsyncBulkCompletionMechanism
          values:
            - { token: ".bulk_group", cpp: "CpBulkCM::BulkGroup" }
      args:
        - { name: "tensor_map", kind: reg }
        - { name: "coords",     kind: reg_list }
        - { name: "src_smem",   kind: addr }
      cpp_struct: "InstrCpAsyncBulkTensor"
      emit_note: "direction = Store"

