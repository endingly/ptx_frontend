# PTX ISA 9.2 — Matrix / Tensor Instructions
# Covers: ldmatrix, stmatrix, mma, wmma, cp.async.bulk.tensor, tcgen05.*

###############################################################################
# ldmatrix
###############################################################################
- opcode: "ldmatrix"
  doc: "PTX ISA §9.7.13.4"
  variants:
    - modifiers:
        sync:
          kind: fixed
          fixed_value: ".sync"
        aligned:
          kind: fixed
          fixed_value: ".aligned"
        transpose:
          kind: optional
          type: bool
          values:
            - { token: ".trans", cpp: "true" }
        number:
          kind: required
          type: MatrixNumber
          values:
            - { token: ".x1", cpp: "MatrixNumber::X1" }
            - { token: ".x2", cpp: "MatrixNumber::X2" }
            - { token: ".x4", cpp: "MatrixNumber::X4" }
      args:
        - { name: "dst",  kind: reg_list, note: "1/2/4 b32 registers" }
        - { name: "addr", kind: addr,     note: "shared memory" }
      cpp_struct: "InstrLdmatrix"

###############################################################################
# stmatrix
###############################################################################
- opcode: "stmatrix"
  doc: "PTX ISA §9.7.13.5"
  variants:
