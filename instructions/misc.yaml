      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        space:
          kind: required
          type: StateSpace
          values:
            - { token: ".const", cpp: "StateSpace::Const" }
            - { token: ".global", cpp: "StateSpace::Global" }
            - { token: ".local", cpp: "StateSpace::Local" }
