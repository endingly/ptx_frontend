# PTX ISA 9.2 — Synchronization Instructions
# Ref: https://docs.nvidia.com/cuda/parallel-thread-execution/index.html#parallel-synchronization-and-communication-instructions

###############################################################################
# bar / barrier
###############################################################################
- opcode: "bar.sync"
  doc: "PTX ISA §9.7.11.1"
  variants:
    - description: "bar.sync with optional thread count"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers: {}
      args:
        - { name: "barname", kind: reg_or_imm, note: "barrier name 0..15" }
        - {
            name: "numthreads",
            kind: optional_reg_or_imm,
            note: "thread count",
          }
      cpp_struct: "InstrBarSync"

- opcode: "bar.arrive"
  doc: "PTX ISA §9.7.11.1"
  variants:
    - description: "bar.arrive"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers: {}
      args:
        - { name: "barname", kind: reg_or_imm }
        - { name: "numthreads", kind: reg_or_imm }
      cpp_struct: "InstrBarArrive"

- opcode: "bar.red"
  doc: "PTX ISA §9.7.11.1"
  variants:
    - description: "bar.red popc/and/or"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        redop:
          kind: required
          type: BarRedOp
          values:
            - { token: ".popc", cpp: "BarRedOp::Popc" }
            - { token: ".and", cpp: "BarRedOp::And" }
            - { token: ".or", cpp: "BarRedOp::Or" }
        pred:
          kind: fixed
          fixed_value: { token: ".pred", cpp: "ScalarType::Pred" }
      args:
        - { name: "dst", kind: reg, note: "destination pred (popc→u32)" }
        - { name: "barname", kind: reg_or_imm }
        - { name: "numthreads", kind: optional_reg_or_imm }
        - { name: "src", kind: pred }
      cpp_struct: "InstrBarRed"

- opcode: "bar.warp.sync"
  doc: "PTX ISA §9.7.11.1"
  variants:
    - description: "bar.warp.sync"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers: {}
      args:
        - { name: "membermask", kind: reg_or_imm, note: "32-bit thread mask" }
      cpp_struct: "InstrBarWarpSync"

- opcode: "barrier.sync"
  doc: "PTX ISA §9.7.11.2"
  variants:
    - description: "barrier.sync with optional thread count"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers: {}
      args:
        - { name: "barname", kind: reg_or_imm }
        - { name: "numthreads", kind: optional_reg_or_imm }
      cpp_struct: "InstrBarrierSync"

- opcode: "barrier.sync.aligned"
  doc: "PTX ISA §9.7.11.2"
  variants:
    - description: "barrier.sync.aligned"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers: {}
      args:
        - { name: "barname", kind: reg_or_imm }
        - { name: "numthreads", kind: optional_reg_or_imm }
      cpp_struct: "InstrBarrierSync"
      emit_note: "aligned = true"

- opcode: "barrier.arrive"
  doc: "PTX ISA §9.7.11.2"
  variants:
    - description: "barrier.arrive"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers: {}
      args:
        - { name: "barname", kind: reg_or_imm }
        - { name: "numthreads", kind: optional_reg_or_imm }
      cpp_struct: "InstrBarrierArrive"

- opcode: "barrier.arrive.aligned"
  doc: "PTX ISA §9.7.11.2"
  variants:
    - description: "barrier.arrive.aligned"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers: {}
      args:
        - { name: "barname", kind: reg_or_imm }
        - { name: "numthreads", kind: optional_reg_or_imm }
      cpp_struct: "InstrBarrierArrive"
      emit_note: "aligned = true"

- opcode: "barrier.cluster.arrive"
  doc: "PTX ISA §9.7.11.3"
  variants:
    - description: "barrier.cluster.arrive with optional aligned"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        aligned:
          kind: optional
          type: bool
          values:
            - { token: ".aligned", cpp: "true" }
      args: []
      cpp_struct: "InstrBarrierClusterArrive"

- opcode: "barrier.cluster.wait"
  doc: "PTX ISA §9.7.11.3"
  variants:
    - description: "barrier.cluster.wait with optional aligned"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        aligned:
          kind: optional
          type: bool
          values:
            - { token: ".aligned", cpp: "true" }
      args: []
      cpp_struct: "InstrBarrierClusterWait"

###############################################################################
# membar
###############################################################################
- opcode: "membar"
  doc: "PTX ISA §9.7.11.4"
  variants:
    - description: "membar level"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        level:
          kind: required
          type: MembarLevel
          values:
            - { token: ".cta", cpp: "MembarLevel::Cta" }
            - { token: ".gl", cpp: "MembarLevel::Gl" }
            - { token: ".sys", cpp: "MembarLevel::Sys" }
            - { token: ".cluster", cpp: "MembarLevel::Cluster" }
      args: []
      cpp_struct: "InstrMembar"

    - description: "membar.proxy.proxykind"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        proxy:
          kind: fixed
          fixed_value: { token: ".proxy", cpp: "true" }
        kind:
          kind: required
          type: FenceProxyKind
          values:
            - { token: ".alias", cpp: "FenceProxyKind::Alias" }
            - { token: ".async", cpp: "FenceProxyKind::Async" }
            - { token: ".async.global", cpp: "FenceProxyKind::AsyncGlobal" }
            - {
                token: ".async.shared::cta",
                cpp: "FenceProxyKind::AsyncSharedCta",
              }
            - {
                token: ".async.shared::cluster",
                cpp: "FenceProxyKind::AsyncSharedCluster",
              }
      args: []
      cpp_struct: "InstrMembarProxy"

###############################################################################
# fence
###############################################################################
- opcode: "fence"
  doc: "PTX ISA §9.7.11.5"
  variants:
    - description: "fence acquire/release"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        qualifier:
          kind: optional
          type: FenceSemantics
          values:
            - { token: ".acquire", cpp: "FenceSemantics::Acquire" }
            - { token: ".release", cpp: "FenceSemantics::Release" }
            - { token: ".acq_rel", cpp: "FenceSemantics::AcqRel" }
            - { token: ".sc", cpp: "FenceSemantics::Sc" }
        scope:
          kind: required
          type: MemScope
          values:
            - { token: ".cta", cpp: "MemScope::Cta" }
            - { token: ".cluster", cpp: "MemScope::Cluster" }
            - { token: ".gpu", cpp: "MemScope::Gpu" }
            - { token: ".sys", cpp: "MemScope::Sys" }
      args: []
      cpp_struct: "InstrFence"

    - description: "fence.sem.sync_restrict::shared::{cta,cluster}.scope"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        sem:
          kind: required
          type: FenceSemantics
          values:
            - { token: ".acquire", cpp: "FenceSemantics::Acquire" }
            - { token: ".release", cpp: "FenceSemantics::Release" }
        sync_restrict:
          kind: required
          type: FenceSyncRestrict
          values:
            - {
                token: ".sync_restrict::shared::cluster",
                cpp: "FenceSyncRestrict::SharedCluster",
              }
            - {
                token: ".sync_restrict::shared::cta",
                cpp: "FenceSyncRestrict::SharedCta",
              }
        scope:
          kind: required
          type: MemScope
          values:
            - { token: ".cluster", cpp: "MemScope::Cluster" }
      args: []
      cpp_struct: "InstrFenceSyncRestrict"

    - description: "fence.op_restrict.sem.scope"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        op_restrict:
          kind: fixed
          fixed_value: { token: ".op_restrict", cpp: "true" }
        sem:
          kind: required
          type: FenceSemantics
          values:
            - { token: ".release", cpp: "FenceSemantics::Release" }
        scope:
          kind: required
          type: MemScope
          values:
            - { token: ".cluster", cpp: "MemScope::Cluster" }
      args: []
      cpp_struct: "InstrFenceOpRestrict"

    - description: "fence.proxy"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        proxy:
          kind: fixed
          fixed_value: { token: ".proxy", cpp: "true" }
        kind:
          kind: required
          type: FenceProxyKind
          values:
            - { token: ".alias", cpp: "FenceProxyKind::Alias" }
            - { token: ".async", cpp: "FenceProxyKind::Async" }
            - { token: ".async.global", cpp: "FenceProxyKind::AsyncGlobal" }
            - { token: ".async.shared", cpp: "FenceProxyKind::AsyncShared" }
            - {
                token: ".async.shared::cta",
                cpp: "FenceProxyKind::AsyncSharedCta",
              }
            - {
                token: ".async.shared::cluster",
                cpp: "FenceProxyKind::AsyncSharedCluster",
              }
      args: []
      cpp_struct: "InstrFenceProxy"

    - description: "fence.proxy.tensormap::generic.sem.scope — uni-directional"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        proxy:
          kind: fixed
          fixed_value: { token: ".proxy", cpp: "true" }
        to_from:
          kind: fixed
          fixed_value: { token: ".tensormap::generic", cpp: "true" }
        sem:
          kind: required
          type: FenceSemantics
          values:
            - { token: ".release", cpp: "FenceSemantics::Release" }
            - { token: ".acquire", cpp: "FenceSemantics::Acquire" }
        scope:
          kind: required
          type: MemScope
          values:
            - { token: ".cta", cpp: "MemScope::Cta" }
            - { token: ".cluster", cpp: "MemScope::Cluster" }
            - { token: ".gpu", cpp: "MemScope::Gpu" }
            - { token: ".sys", cpp: "MemScope::Sys" }
      args:
        - { name: "addr", kind: optional_addr, note: "only for .acquire" }
        - { name: "size", kind: optional_reg_or_imm, note: "only for .acquire" }
      cpp_struct: "InstrFenceProxyTensormap"

    - description: "fence.proxy.async::generic.sem.sync_restrict..."
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        proxy:
          kind: fixed
          fixed_value: { token: ".proxy", cpp: "true" }
        async_generic:
          kind: fixed
          fixed_value: { token: ".async::generic", cpp: "true" }
        sem:
          kind: required
          type: FenceSemantics
          values:
            - { token: ".acquire", cpp: "FenceSemantics::Acquire" }
            - { token: ".release", cpp: "FenceSemantics::Release" }
        sync_restrict:
          kind: required
          type: FenceSyncRestrict
          values:
            - {
                token: ".sync_restrict::shared::cluster",
                cpp: "FenceSyncRestrict::SharedCluster",
              }
            - {
                token: ".sync_restrict::shared::cta",
                cpp: "FenceSyncRestrict::SharedCta",
              }
        scope:
          kind: required
          type: MemScope
          values:
            - { token: ".cluster", cpp: "MemScope::Cluster" }
      args: []
      cpp_struct: "InstrFenceProxyAsyncGeneric"

###############################################################################
# atom
###############################################################################
- opcode: "atom"
  doc: "PTX ISA §9.7.11.6"
  variants:
    - description: "atom (default/weak)"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        qualifier:
          kind: optional
          type: AtomQualifier
          values:
            - { token: ".weak", cpp: "AtomQualifier::Weak" }
            - { token: ".relaxed", cpp: "AtomQualifier::Relaxed" }
            - { token: ".acquire", cpp: "AtomQualifier::Acquire" }
            - { token: ".release", cpp: "AtomQualifier::Release" }
            - { token: ".acq_rel", cpp: "AtomQualifier::AcqRel" }
        scope:
          kind: optional
          type: MemScope
          values:
            - { token: ".cta", cpp: "MemScope::Cta" }
            - { token: ".cluster", cpp: "MemScope::Cluster" }
            - { token: ".gpu", cpp: "MemScope::Gpu" }
            - { token: ".sys", cpp: "MemScope::Sys" }
        ss:
          kind: optional
          type: StateSpace
          values:
            - { token: ".global", cpp: "StateSpace::Global" }
            - { token: ".shared", cpp: "StateSpace::Shared" }
            - { token: ".shared::cta", cpp: "StateSpace::Shared" }
            - { token: ".shared::cluster", cpp: "StateSpace::SharedCluster" }
        op:
          kind: required
          type: AtomOp
          values:
            - { token: ".and", cpp: "AtomOp::And" }
            - { token: ".or", cpp: "AtomOp::Or" }
            - { token: ".xor", cpp: "AtomOp::Xor" }
            - { token: ".cas", cpp: "AtomOp::Cas" }
            - { token: ".exch", cpp: "AtomOp::Exch" }
            - { token: ".add", cpp: "AtomOp::Add" }
            - { token: ".inc", cpp: "AtomOp::Inc" }
            - { token: ".dec", cpp: "AtomOp::Dec" }
            - { token: ".min", cpp: "AtomOp::Min" }
            - { token: ".max", cpp: "AtomOp::Max" }
        type_:
          kind: required
          type: ScalarType
          values:
            - { token: ".b32", cpp: "ScalarType::B32" }
            - { token: ".b64", cpp: "ScalarType::B64" }
            - { token: ".b128", cpp: "ScalarType::B128" }
            - { token: ".u32", cpp: "ScalarType::U32" }
            - { token: ".u64", cpp: "ScalarType::U64" }
            - { token: ".s32", cpp: "ScalarType::S32" }
            - { token: ".s64", cpp: "ScalarType::S64" }
            - { token: ".f16", cpp: "ScalarType::F16" }
            - { token: ".f16x2", cpp: "ScalarType::F16x2" }
            - { token: ".bf16", cpp: "ScalarType::BF16" }
            - { token: ".f32", cpp: "ScalarType::F32" }
            - { token: ".f64", cpp: "ScalarType::F64" }
      args:
        - { name: "dst", kind: reg, note: "old value; omit for .red" }
        - { name: "addr", kind: addr }
        - { name: "src1", kind: reg_or_imm }
        - { name: "src2", kind: optional_reg_or_imm, note: "only for .cas" }
      cpp_struct: "InstrAtom"

