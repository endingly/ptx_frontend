###############################################################################
# cp.async.bulk  (TMA family)
###############################################################################
- opcode: "cp.async.bulk"
  doc: "PTX ISA §9.7.11.13"
  variants:
    - description: "cp.async.bulk shared←global"
      constraints:
        min_ptx_version: 1.0
        min_sm: 0
      modifiers:
        dst_space:
          kind: fixed
          fixed_value: { token: ".shared::cluster", cpp: "StateSpace::SharedCluster" }
        src_space:
          kind: fixed
          fixed_value: { token: ".global", cpp: "StateSpace::Global" }
        completion_mechanism:
          kind: required
          type: CpAsyncBulkCompletionMechanism
          values:
