# PTX ISA 9.2 — Warp-Level Shuffle Instructions

###############################################################################
# shfl.sync
###############################################################################
- opcode: "shfl.sync"
  doc: "PTX ISA §9.7.9.1"
  variants:
    - description: "shfl.sync mode.b32"
      constraints:
        min_ptx_version: 6.0
        min_sm: 53
      modifiers:
        mode:
          kind: required
          type: ShuffleMode
          values:
            - { token: ".up", cpp: "ShuffleMode::Up" }
            - { token: ".down", cpp: "ShuffleMode::Down" }
            - { token: ".bfly", cpp: "ShuffleMode::Bfly" }
            - { token: ".idx", cpp: "ShuffleMode::Idx" }
        b32:
          kind: fixed
          fixed_value: { token: ".b32", cpp: "ScalarType::B32" }
      args:
        - { name: "dst", kind: reg }
        - { name: "pred_out", kind: optional_pred }
        - { name: "src", kind: reg }
        - { name: "src_b", kind: reg_or_imm }
        - { name: "membermask", kind: reg_or_imm }
      cpp_struct: "InstrShflSync"
